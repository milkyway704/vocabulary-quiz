<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Vocabulary & Grammar Quiz</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div
			id="mode-selection"
			class="setup-container"
			style="text-align: center"
		>
			<h2>請選擇練習模式</h2>
			<div class="mode-buttons">
				<button onclick="selectMainMode('vocabulary')" class="btn-main">
					單字練習
				</button>
				<button
					onclick="selectMainMode('grammar')"
					class="btn-main btn-grammar"
				>
					文法練習
				</button>
			</div>
		</div>

		<div id="setup-options" class="setup-container" style="display: none">
			<button onclick="backToModeSelection()" class="btn-back">
				← 返回
			</button>

			<div class="setup-row">
				<strong id="selected-mode-label">單字模式</strong>
				<span>範圍:</span>
				<select id="start-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
				</select>
				<span>to</span>
				<select id="end-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
				</select>
			</div>

			<div class="setup-row">
				<span>題數:</span>
				<select id="quiz-amount">
					<option value="10">10</option>
					<option value="20">20</option>
					<option value="all">All</option>
				</select>
				<span>模式:</span>
				<select id="quiz-mode">
					<option value="fill-in">填充題</option>
					<option value="multiple-choice">選擇題</option>
				</select>
				<label class="ai-toggle-label">
					<input type="checkbox" id="use-ai-toggle" /> Use AI
				</label>
			</div>
			<button onclick="startNewQuiz()" class="btn-start">
				Start Quiz
			</button>
		</div>

		<div class="quiz-container">
			<div class="status-bar" id="status-text">Ready</div>

			<div id="quiz-area" style="display: none">
				<button onclick="exitQuiz()" class="btn-exit">✕</button>
				<p class="sentence" id="sentence-text"></p>
				<p class="translation" id="translation-text"></p>

				<input
					type="text"
					id="user-input"
					placeholder="Type..."
					autocomplete="off"
				/>
				<div
					id="options-container"
					class="options-grid"
					style="display: none"
				></div>

				<button id="submit-btn" onclick="checkAnswer()">Submit</button>
				<div id="feedback" class="feedback"></div>
				<button
					id="next-btn"
					onclick="nextQuestion()"
					style="display: none"
				>
					Next Question
				</button>
			</div>

			<div id="result-area" style="display: none">
				<h3>Quiz Completed</h3>
				<p id="score-text"></p>
				<div id="mistake-list-container">
					<table id="mistake-table">
						<thead>
							<tr>
								<th>Word</th>
								<th>Meaning</th>
							</tr>
						</thead>
						<tbody id="mistake-table-body"></tbody>
					</table>
				</div>
				<button onclick="startReview()" id="review-btn">
					Review Mistakes
				</button>
				<button onclick="location.reload()" class="btn-secondary">
					New Quiz
				</button>
			</div>
		</div>

		<script src="data.js"></script>
		<script src="api-client.js"></script>
		<script src="script.js"></script>
	</body>
</html>
