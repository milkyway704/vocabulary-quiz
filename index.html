<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Vocabulary Quiz</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				max-width: 100%;
				margin: 0;
				padding: 15px;
				box-sizing: border-box;
				background-color: #f4f7f9;
			}
			.setup-container {
				background: #e9ecef;
				padding: 15px;
				border-radius: 12px;
				margin-bottom: 15px;
			}
			.setup-row {
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 10px;
			}
			select {
				padding: 8px;
				border-radius: 5px;
				border: 1px solid #ccc;
				font-size: 1rem;
			}
			.status-bar {
				font-size: 0.9rem;
				color: #555;
				margin-bottom: 10px;
				text-align: right;
			}
			.quiz-container {
				background: white;
				padding: 20px;
				border-radius: 12px;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				width: 100%;
				box-sizing: border-box;
			}
			.sentence {
				font-size: 1.4rem;
				margin-bottom: 10px;
				word-wrap: break-word;
			}
			.translation {
				color: #666;
				font-size: 1.1rem;
				margin-bottom: 20px;
				border-left: 4px solid #007bff;
				padding-left: 10px;
			}
			input[type="text"] {
				width: 100%;
				padding: 15px;
				font-size: 1.2rem;
				margin-bottom: 15px;
				border: 2px solid #007bff;
				border-radius: 8px;
				box-sizing: border-box;
			}
			button {
				width: 100%;
				padding: 15px;
				font-size: 1.2rem;
				cursor: pointer;
				background: #007bff;
				color: white;
				border: none;
				border-radius: 8px;
			}
			.feedback {
				margin-top: 20px;
				padding: 15px;
				font-size: 1.1rem;
				border-radius: 8px;
				display: none;
			}
			.wrong {
				background: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}
			.correct {
				background: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}
		</style>
	</head>
	<body>
		<div class="setup-container">
			<div class="setup-row">
				<span>Range: </span>
				<select id="start-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
				</select>
				<span>to</span>
				<select id="end-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
				</select>
			</div>
			<button
				onclick="startNewQuiz()"
				style="padding: 10px; font-size: 1rem; background: #6c757d"
			>
				Start New Quiz
			</button>
		</div>

		<div class="quiz-container">
			<div class="status-bar" id="status-text">
				Select range and start
			</div>
			<div id="quiz-area" style="display: none">
				<p class="sentence" id="sentence-text"></p>
				<p class="translation" id="translation-text"></p>
				<input
					type="text"
					id="user-input"
					placeholder="Type the word..."
					autocomplete="off"
				/>
				<button id="submit-btn" onclick="checkAnswer()">Submit</button>
				<div id="feedback" class="feedback"></div>
				<button
					id="next-btn"
					onclick="nextQuestion()"
					style="display: none; background: #28a745; margin-top: 10px"
				>
					Next Question
				</button>
			</div>

			<div id="result-area" style="display: none">
				<h3>Quiz Completed</h3>
				<p id="score-text"></p>
				<button onclick="startReview()">Review Mistakes</button>
			</div>
		</div>

		<script src="data.js"></script>
		<script>
			let currentQueue = [];
			let errorList = [];
			let currentIndex = 0;
			let score = 0;

			// Enter key support
			document
				.getElementById("user-input")
				.addEventListener("keypress", function (e) {
					if (e.key === "Enter") {
						const submitBtn = document.getElementById("submit-btn");
						const nextBtn = document.getElementById("next-btn");
						if (submitBtn.style.display !== "none") checkAnswer();
						else if (nextBtn.style.display !== "none")
							nextQuestion();
					}
				});

			function startNewQuiz() {
				const start = parseInt(
					document.getElementById("start-lesson").value,
				);
				const end = parseInt(
					document.getElementById("end-lesson").value,
				);

				if (start > end) {
					alert(
						"Invalid range! 'From' must be less than or equal to 'To'.",
					);
					return;
				}

				// 合併選擇範圍內的單字
				currentQueue = [];
				for (let i = start; i <= end; i++) {
					const key = "L" + i;
					if (fullWordBank[key]) {
						currentQueue = currentQueue.concat(fullWordBank[key]);
					}
				}

				// 洗牌隨機化題目 (選用，若想按順序請註解掉下一行)
				currentQueue.sort(() => Math.random() - 0.5);

				currentIndex = 0;
				score = 0;
				errorList = [];

				document.getElementById("quiz-area").style.display = "block";
				document.getElementById("result-area").style.display = "none";
				showQuestion();
			}

			function showQuestion() {
				if (currentIndex >= currentQueue.length) {
					showResult();
					return;
				}
				updateStatus();
				const q = currentQueue[currentIndex];
				document.getElementById("sentence-text").innerText = q.q;
				document.getElementById("translation-text").innerText = q.t;
				document.getElementById("user-input").value = "";
				document.getElementById("user-input").focus();
				document.getElementById("feedback").style.display = "none";
				document.getElementById("submit-btn").style.display = "block";
				document.getElementById("next-btn").style.display = "none";
			}

			function updateStatus() {
				document.getElementById("status-text").innerText =
					`Progress: ${currentIndex + 1} / ${currentQueue.length}`;
			}

			function checkAnswer() {
				const userAns = document
					.getElementById("user-input")
					.value.trim()
					.toLowerCase();
				const currentQ = currentQueue[currentIndex];
				const feedback = document.getElementById("feedback");

				feedback.style.display = "block";
				document.getElementById("submit-btn").style.display = "none";
				document.getElementById("next-btn").style.display = "block";

				if (userAns === currentQ.word.toLowerCase()) {
					feedback.className = "feedback correct";
					feedback.innerText = "Correct!";
					score++;
				} else {
					feedback.className = "feedback wrong";
					feedback.innerText = `Incorrect. The answer is: ${currentQ.word}`;
					if (!errorList.includes(currentQ)) errorList.push(currentQ);
				}
			}

			function nextQuestion() {
				currentIndex++;
				showQuestion();
			}

			function showResult() {
				document.getElementById("quiz-area").style.display = "none";
				document.getElementById("result-area").style.display = "block";
				document.getElementById("score-text").innerText =
					`Final Score: ${score} / ${currentQueue.length}`;
				document.getElementById("status-text").innerText = "Finished";
			}

			function startReview() {
				if (errorList.length === 0) {
					alert("No mistakes to review!");
					return;
				}
				currentQueue = [...errorList];
				errorList = [];
				currentIndex = 0;
				score = 0;
				document.getElementById("quiz-area").style.display = "block";
				document.getElementById("result-area").style.display = "none";
				showQuestion();
			}
		</script>
	</body>
</html>
