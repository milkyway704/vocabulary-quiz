<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Vocabulary & Grammar Quiz</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div
			id="mode-selection"
			class="setup-container"
			style="text-align: center"
		>
			<h2>Select Practice Mode</h2>
			<div class="mode-buttons">
				<button onclick="selectMainMode('vocabulary')" class="btn-main">
					Vocabulary
				</button>
				<button
					onclick="selectMainMode('grammar')"
					class="btn-main btn-grammar"
				>
					Grammar
				</button>
			</div>
		</div>

		<div id="setup-options" class="setup-container" style="display: none">
			<button onclick="backToModeSelection()" class="btn-back">
				← Back
			</button>
			<div class="setup-row">
				<strong id="selected-mode-label">Vocabulary Mode</strong>
				<br /><br />
				<span>Range:</span>
				<select id="start-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
					<option value="3">L3</option>
					<option value="4">L4</option>
					<option value="5">L5</option>
				</select>
				<span>to</span>
				<select id="end-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
					<option value="3">L3</option>
					<option value="4">L4</option>
					<option value="5">L5</option>
				</select>
			</div>
			<div class="setup-row">
				<span>Questions:</span>
				<select id="quiz-amount">
					<option value="5">5</option>
					<option value="10">10</option>
					<option value="20">20</option>
				</select>

				<span>Mode:</span>
				<select id="quiz-mode">
					<option value="fill-in">Fill-in</option>
					<option value="multiple-choice">Multiple Choice</option>
				</select>

				<label class="ai-toggle-label" style="margin-left: 10px">
					<input type="checkbox" id="use-ai" checked /> AI
				</label>
			</div>
			<button onclick="startNewQuiz()" class="btn-start">
				Start Quiz
			</button>
		</div>

		<div class="quiz-container">
			<div class="status-bar" id="status-text">Ready</div>
			<div id="quiz-area" style="display: none">
				<button onclick="exitQuiz()" class="btn-exit">✕</button>
				<p class="sentence" id="sentence-text"></p>
				<p class="translation" id="translation-text"></p>
				<input
					type="text"
					id="user-input"
					placeholder="Type..."
					autocomplete="off"
				/>
				<div
					id="options-container"
					class="options-grid"
					style="display: none"
				></div>
				<button id="submit-btn" onclick="checkAnswer()">Submit</button>
				<div id="feedback" class="feedback"></div>
				<button
					id="next-btn"
					onclick="nextQuestion()"
					style="display: none"
				>
					Next Question
				</button>
			</div>
			<div id="result-area" style="display: none">
				<h3>Quiz Completed</h3>
				<p id="score-text"></p>
				<table id="mistake-table">
					<thead>
						<tr>
							<th>Word</th>
							<th>Meaning</th>
						</tr>
					</thead>
					<tbody id="mistake-table-body"></tbody>
				</table>

				<button
					onclick="startReview()"
					id="review-btn"
					style="display: none"
				>
					Review Mistakes
				</button>

				<button onclick="location.reload()" class="btn-secondary">
					New Quiz
				</button>
			</div>
		</div>

		<script src="data.js"></script>
		<script src="grammar_data.js"></script>
		<script src="api-client.js"></script>
		<script src="script.js"></script>
	</body>
</html>
