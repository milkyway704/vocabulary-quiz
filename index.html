<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Vocabulary Quiz</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				max-width: 100%;
				margin: 0;
				padding: 15px;
				box-sizing: border-box;
				background-color: #f4f7f9;
			}
			.quiz-container {
				background: white;
				padding: 20px;
				border-radius: 12px;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				width: 100%;
				box-sizing: border-box;
			}
			.sentence {
				font-size: 1.4rem;
				margin-bottom: 10px;
				word-wrap: break-word;
			}
			.translation {
				color: #666;
				font-size: 1.1rem;
				margin-bottom: 20px;
				border-left: 4px solid #007bff;
				padding-left: 10px;
			}
			input[type="text"] {
				width: 100%;
				padding: 15px;
				font-size: 1.2rem;
				margin-bottom: 15px;
				border: 2px solid #007bff;
				border-radius: 8px;
				box-sizing: border-box;
			}
			button {
				width: 100%;
				padding: 15px;
				font-size: 1.2rem;
				cursor: pointer;
				background: #007bff;
				color: white;
				border: none;
				border-radius: 8px;
			}
			.feedback {
				margin-top: 20px;
				padding: 15px;
				font-size: 1.1rem;
				border-radius: 8px;
				display: none;
			}
			.wrong {
				background: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}
			.correct {
				background: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}
		</style>
	</head>
	<body>
		<div class="quiz-container">
			<h2>Vocabulary Quiz (L1)</h2>
			<div id="quiz-area">
				<p class="sentence" id="sentence-text"></p>
				<p class="translation" id="translation-text"></p>
				<input
					type="text"
					id="user-input"
					placeholder="Type the word..."
					autocomplete="off"
				/>

				<button id="submit-btn" onclick="checkAnswer()">Submit</button>

				<div id="feedback" class="feedback"></div>

				<button
					id="next-btn"
					onclick="nextQuestion()"
					style="display: none; background: #28a745; margin-top: 10px"
				>
					Next Question
				</button>
			</div>

			<div id="result-area" style="display: none">
				<h3>Quiz Completed</h3>
				<p id="score-text"></p>
				<button onclick="startReview()">Review Mistakes</button>
				<button
					onclick="location.reload()"
					style="background: #6c757d; margin-top: 10px"
				>
					Restart All
				</button>
			</div>
		</div>

		<script src="data.js"></script>
		<script>
			let currentQueue = [...wordBank];
			let errorList = [];
			let currentIndex = 0;
			let score = 0;

			function checkAnswer() {
				const userAns = document
					.getElementById("user-input")
					.value.trim()
					.toLowerCase();
				const currentQ = currentQueue[currentIndex];
				const correctAns = currentQ.word.toLowerCase();
				const feedback = document.getElementById("feedback");
				const submitBtn = document.getElementById("submit-btn");
				const nextBtn = document.getElementById("next-btn");

				feedback.style.display = "block";
				submitBtn.style.display = "none"; // 隱藏提交按鈕
				nextBtn.style.display = "block"; // 顯示下一題按鈕

				if (userAns === correctAns) {
					feedback.className = "feedback correct";
					feedback.innerText = "Correct!";
					score++;
				} else {
					feedback.className = "feedback wrong";
					feedback.innerText = `Incorrect. The answer is: ${currentQ.word}`;
					if (!errorList.includes(currentQ)) {
						errorList.push(currentQ);
					}
				}
			}

			function nextQuestion() {
				currentIndex++;

				// 恢復按鈕狀態
				document.getElementById("submit-btn").style.display = "block";
				document.getElementById("next-btn").style.display = "none";

				showQuestion();
			}

			function showQuestion() {
				if (currentIndex >= currentQueue.length) {
					showResult();
					return;
				}
				const q = currentQueue[currentIndex];
				document.getElementById("sentence-text").innerText = q.q;
				document.getElementById("translation-text").innerText = q.t;
				document.getElementById("user-input").value = "";
				document.getElementById("user-input").focus(); // 自動聚焦輸入框
				document.getElementById("feedback").style.display = "none";
			}

			function startReview() {
				if (errorList.length === 0) {
					location.reload();
					return;
				}
				currentQueue = [...errorList];
				errorList = [];
				currentIndex = 0;
				score = 0;
				document.getElementById("quiz-area").style.display = "block";
				document.getElementById("result-area").style.display = "none";
				showQuestion();
			}

			showQuestion();
		</script>
	</body>
</html>
