<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>Vocabulary Quiz</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				max-width: 100%;
				margin: 0;
				padding: 15px;
				box-sizing: border-box;
				background-color: #f4f7f9;
			}
			.setup-container {
				background: #e9ecef;
				padding: 15px;
				border-radius: 12px;
				margin-bottom: 15px;
			}
			.setup-row {
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 10px;
				flex-wrap: wrap;
			}
			select {
				padding: 8px;
				border-radius: 5px;
				border: 1px solid #ccc;
				font-size: 1rem;
			}
			.status-bar {
				font-size: 0.9rem;
				color: #555;
				margin-bottom: 10px;
				text-align: right;
			}
			.quiz-container {
				background: white;
				padding: 20px;
				border-radius: 12px;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
				width: 100%;
				box-sizing: border-box;
			}
			.sentence {
				font-size: 1.4rem;
				margin-bottom: 10px;
				word-wrap: break-word;
			}
			.translation {
				color: #666;
				font-size: 1.1rem;
				margin-bottom: 20px;
				border-left: 4px solid #007bff;
				padding-left: 10px;
			}

			/* Input & Buttons */
			input[type="text"] {
				width: 100%;
				padding: 15px;
				font-size: 1.2rem;
				margin-bottom: 15px;
				border: 2px solid #007bff;
				border-radius: 8px;
				box-sizing: border-box;
			}
			button {
				width: 100%;
				padding: 15px;
				font-size: 1.2rem;
				cursor: pointer;
				background: #007bff;
				color: white;
				border: none;
				border-radius: 8px;
			}

			/* Multiple Choice Options */
			.options-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 10px;
				margin-bottom: 15px;
			}
			.option-btn {
				background: #fff;
				color: #007bff;
				border: 2px solid #007bff;
				padding: 12px;
				font-size: 1.1rem;
				transition: 0.2s;
			}
			.option-btn:hover {
				background: #f0f7ff;
			}
			.option-btn.selected {
				background: #007bff;
				color: #white;
			}

			.feedback {
				margin-top: 20px;
				padding: 15px;
				font-size: 1.1rem;
				border-radius: 8px;
				display: none;
			}
			.wrong {
				background: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}
			.correct {
				background: #d4edda;
				color: #155724;
				border: 1px solid #c3e6cb;
			}
		</style>
	</head>
	<body>
		<div class="setup-container">
			<div class="setup-row">
				<span>Range:</span>
				<select id="start-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
				</select>
				<span>to</span>
				<select id="end-lesson">
					<option value="1">L1</option>
					<option value="2">L2</option>
				</select>
			</div>
			<div class="setup-row">
				<span>Mode:</span>
				<select id="quiz-mode">
					<option value="fill-in">Fill-in the Blanks</option>
					<option value="multiple-choice">Multiple Choice</option>
				</select>
			</div>
			<button
				onclick="startNewQuiz()"
				style="padding: 10px; font-size: 1rem; background: #6c757d"
			>
				Start New Quiz
			</button>
		</div>

		<div class="quiz-container">
			<div class="status-bar" id="status-text">
				Select range and start
			</div>
			<div id="quiz-area" style="display: none">
				<p class="sentence" id="sentence-text"></p>
				<p class="translation" id="translation-text"></p>

				<input
					type="text"
					id="user-input"
					placeholder="Type the word..."
					autocomplete="off"
				/>

				<div
					id="options-container"
					class="options-grid"
					style="display: none"
				></div>

				<button id="submit-btn" onclick="checkAnswer()">Submit</button>
				<div id="feedback" class="feedback"></div>
				<button
					id="next-btn"
					onclick="nextQuestion()"
					style="display: none; background: #28a745; margin-top: 10px"
				>
					Next Question
				</button>
			</div>

			<div id="result-area" style="display: none">
				<h3>Quiz Completed</h3>
				<p id="score-text"></p>
				<button onclick="startReview()">Review Mistakes</button>
			</div>
		</div>

		<script src="data.js"></script>
		<script>
			const correctSound = new Audio("./assets/correct.wav");
			const wrongSound = new Audio("./assets/wrong.wav");

			let currentQueue = [];
			let errorList = [];
			let currentIndex = 0;
			let score = 0;

			// Enter key support
			document
				.getElementById("user-input")
				.addEventListener("keypress", (e) => {
					if (e.key === "Enter") {
						if (
							document.getElementById("submit-btn").style
								.display !== "none"
						)
							checkAnswer();
						else if (
							document.getElementById("next-btn").style
								.display !== "none"
						)
							nextQuestion();
					}
				});

			function startNewQuiz() {
				const start = parseInt(
					document.getElementById("start-lesson").value,
				);
				const end = parseInt(
					document.getElementById("end-lesson").value,
				);
				if (start > end) {
					alert("Invalid range!");
					return;
				}

				currentQueue = [];
				for (let i = start; i <= end; i++) {
					const key = "L" + i;
					if (fullWordBank[key])
						currentQueue = currentQueue.concat(fullWordBank[key]);
				}
				currentQueue.sort(() => Math.random() - 0.5);
				currentIndex = 0;
				score = 0;
				errorList = [];

				document.getElementById("quiz-area").style.display = "block";
				document.getElementById("result-area").style.display = "none";
				showQuestion();
			}

			function showQuestion() {
				if (currentIndex >= currentQueue.length) {
					showResult();
					return;
				}
				updateStatus();
				const q = currentQueue[currentIndex];
				const mode = document.getElementById("quiz-mode").value;

				document.getElementById("sentence-text").innerText = q.q;
				document.getElementById("translation-text").innerText = q.t;
				document.getElementById("feedback").style.display = "none";
				document.getElementById("next-btn").style.display = "none";

				if (mode === "multiple-choice") {
					document.getElementById("user-input").style.display =
						"none";
					document.getElementById("submit-btn").style.display =
						"none";
					document.getElementById("options-container").style.display =
						"grid";
					generateOptions(q);
				} else {
					document.getElementById("user-input").style.display =
						"block";
					document.getElementById("submit-btn").style.display =
						"block";
					document.getElementById("options-container").style.display =
						"none";
					document.getElementById("user-input").value = "";
					document.getElementById("user-input").focus();
				}
			}

			async function generateOptions(correctItem) {
				const container = document.getElementById("options-container");
				container.innerHTML =
					"<div style='grid-column: 1/-1; text-align:center;'>Loading AI options...</div>";

				let distractors = [];

				try {
					// 呼叫你在 Vercel 建立的 API 端點
					const response = await fetch(
						`/api/generate?word=${encodeURIComponent(correctItem.word)}`,
					);
					const data = await response.json();

					if (data.distractors) {
						// 解析回傳的字串 "word1, word2, word3"
						distractors = data.distractors
							.split(",")
							.map((w) => w.trim());
					} else {
						throw new Error("No distractors received");
					}
				} catch (error) {
					console.error(
						"AI Error, falling back to local database:",
						error,
					);
					// 備案邏輯：如果 AI 出錯或網路斷線，改用原本的隨機抓取法
					const allWords = Object.values(fullWordBank).flat();
					distractors = allWords
						.filter((item) => item.word !== correctItem.word)
						.map((item) => item.word)
						.sort(() => 0.5 - Math.random())
						.slice(0, 3);
				}

				// 合併正確答案並隨機排序
				const options = [correctItem.word, ...distractors].sort(
					() => 0.5 - Math.random(),
				);

				container.innerHTML = ""; // 清空 Loading 字樣
				options.forEach((opt) => {
					const btn = document.createElement("button");
					btn.className = "option-btn";
					btn.innerText = opt;
					btn.onclick = () => checkChoice(opt, correctItem.word);
					container.appendChild(btn);
				});
			}

			function checkChoice(selected, correct) {
				// 選擇題點擊後直接判斷
				showFeedback(
					selected.toLowerCase() === correct.toLowerCase(),
					correct,
				);
			}

			function checkAnswer() {
				const userAns = document
					.getElementById("user-input")
					.value.trim()
					.toLowerCase();
				const correct = currentQueue[currentIndex].word.toLowerCase();
				showFeedback(
					userAns === correct,
					currentQueue[currentIndex].word,
				);
			}

			function showFeedback(isCorrect, correctWord) {
				const feedback = document.getElementById("feedback");
				feedback.style.display = "block";
				document.getElementById("submit-btn").style.display = "none";
				document.getElementById("options-container").style.display =
					"none";
				document.getElementById("next-btn").style.display = "block";

				if (isCorrect) {
					feedback.className = "feedback correct";
					feedback.innerText = "Correct!";
					score++;
					correctSound.play();
				} else {
					feedback.className = "feedback wrong";
					feedback.innerText = `Incorrect. The answer is: ${correctWord}`;
					if (!errorList.includes(currentQueue[currentIndex]))
						errorList.push(currentQueue[currentIndex]);
					wrongSound.play();
				}
			}

			function updateStatus() {
				document.getElementById("status-text").innerText =
					`Progress: ${currentIndex + 1} / ${currentQueue.length}`;
			}

			function nextQuestion() {
				currentIndex++;
				showQuestion();
			}

			function showResult() {
				document.getElementById("quiz-area").style.display = "none";
				document.getElementById("result-area").style.display = "block";
				document.getElementById("score-text").innerText =
					`Final Score: ${score} / ${currentQueue.length}`;
			}

			function startReview() {
				if (errorList.length === 0) return;
				currentQueue = [...errorList];
				errorList = [];
				currentIndex = 0;
				score = 0;
				document.getElementById("quiz-area").style.display = "block";
				document.getElementById("result-area").style.display = "none";
				showQuestion();
			}
		</script>
	</body>
</html>
